<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — FitBlog</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-banner">
    <div class="logo">⚡ FitBlog</div>
    <h1>Train Hard.<br /><span>Read Harder.</span></h1>
    <p>Join thousands of fitness enthusiasts sharing workouts, nutrition tips, and transformation stories every day.</p>
  </div>

  <div class="auth-form-side">
    <h2>Create your account</h2>
    <p class="subtitle">Start sharing your fitness journey today.</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="signupForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. ironmike" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters" required />
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Create Account</button>
    </form>

    <div class="form-footer">
      Already have an account? <a href="/login.html">Log in</a>
    </div>
  </div>

  <script src="/js/signup.js"></script>
</body>
</html>
