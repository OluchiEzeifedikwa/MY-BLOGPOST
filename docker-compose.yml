services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://OluchiEze:mesh4199@postgres:5432/myblogpost
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MONGO_URL: ${MONGO_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pnpm exec prisma migrate deploy && pnpm exec tsx src/index.ts"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: OluchiEze
      POSTGRES_PASSWORD: mesh4199
      POSTGRES_DB: myblogpost
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U OluchiEze -d myblogpost"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
